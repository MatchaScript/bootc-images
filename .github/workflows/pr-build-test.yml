name: PR Build Test

on:
  pull_request:
    branches: [main]
    paths:
      - "*.Containerfile"
      - "overlay.d/**"
      - ".github/workflows/pr-build-test.yml"

permissions:
  contents: read

env:
  BOOTC_BASE: "quay.io/fedora/fedora-bootc:latest"

jobs:
  shellcheck:
    name: Run ShellCheck
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run ShellCheck
        run: |
          sudo apt-get update && sudo apt-get install -y shellcheck
          find overlay.d -name "*.sh" -exec shellcheck {} +

  build-test:
    name: "Build ${{ matrix.name }}"
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: base (amd64)
            containerfile: base.Containerfile
            platform: linux/amd64
            runner: ubuntu-24.04
          - name: base (arm64)
            containerfile: base.Containerfile
            platform: linux/arm64
            runner: ubuntu-24.04-arm
          - name: asahi (arm64)
            containerfile: asahi.Containerfile
            platform: linux/arm64
            runner: ubuntu-24.04-arm
          - name: hyper-v (amd64)
            containerfile: hyper-v.Containerfile
            platform: linux/amd64
            runner: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install newer podman (from Debian trixie)
        run: |
          sudo apt-get install -y debian-archive-keyring
          echo 'deb [signed-by=/usr/share/keyrings/debian-archive-keyring.gpg] https://ftp.debian.org/debian/ trixie main' | sudo tee /etc/apt/sources.list.d/trixie.list
          sudo apt-get update
          sudo apt-get install -y crun/trixie podman/trixie

      - name: Get VERSION_ID from bootc base image
        id: get_version
        run: |
          VERSION_ID=$(sudo podman run --rm ${{ env.BOOTC_BASE }} cat /etc/os-release | grep '^VERSION_ID=' | cut -d= -f2 | tr -d '"' 2>/dev/null || echo "")

          if [ -z "$VERSION_ID" ] || [ "$VERSION_ID" = "unknown" ]; then
            VERSION_ID=$(sudo podman inspect ${{ env.BOOTC_BASE }} --format='{{index .Config.Labels "org.opencontainers.image.version"}}' 2>/dev/null || echo "rawhide")
          fi

          if [ -z "$VERSION_ID" ] || [ "$VERSION_ID" = "<no value>" ] || [ "$VERSION_ID" = "unknown" ]; then
            VERSION_ID="rawhide"
          fi

          echo "version_id=$VERSION_ID" >> $GITHUB_OUTPUT
          echo "Detected VERSION_ID: $VERSION_ID"

      - name: Build base image if needed
        if: matrix.name == 'hyper-v (amd64)'
        env:
          VERSION_ID: ${{ steps.get_version.outputs.version_id }}
        run: |
          sudo podman build \
            --platform linux/amd64 \
            --security-opt=label=disable \
            --cap-add=all \
            --device /dev/fuse \
            --build-arg VERSION_ID="${VERSION_ID}" \
            --tag ghcr.io/matchascript/fedora-bootc:base-amd64 \
            -f base.Containerfile \
            .

      - name: Build image
        env:
          VERSION_ID: ${{ steps.get_version.outputs.version_id }}
        run: |
          sudo podman build \
            --platform ${{ matrix.platform }} \
            --security-opt=label=disable \
            --cap-add=all \
            --device /dev/fuse \
            --build-arg BOOTC_BASE=${{ env.BOOTC_BASE }} \
            --build-arg VERSION_ID="${VERSION_ID}" \
            --tag test-${{ github.event.pull_request.number }} \
            -f ${{ matrix.containerfile }} \
            .

      - name: Verify image
        run: |
          sudo podman inspect test-${{ github.event.pull_request.number }}
          echo "✅ Build succeeded: ${{ matrix.name }}"

      - name: Verify Asahi Linux artifacts
        if: matrix.name == 'asahi (arm64)'
        run: |
          echo "Checking Asahi specific artifacts..."
          sudo podman run --rm test-${{ github.event.pull_request.number }} test -s /usr/share/m1n1/universal-boot.bin
          sudo podman run --rm test-${{ github.event.pull_request.number }} test -s /usr/lib/asahi-boot/m1n1.bin
          sudo podman run --rm test-${{ github.event.pull_request.number }} test -s /usr/lib/asahi-boot/u-boot-nodtb.bin
          echo "✅ Asahi specific build verification succeeded"
